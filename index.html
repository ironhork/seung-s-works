<!DOCTYPE html>
<html lang='ko'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>TOEIC VOCA Master</title>
  <link rel='stylesheet' href='style.css'>
</head>
<body>

  <button id='theme-btn' onclick='toggleTheme()'>🌙 다크모드</button>

  <div class='container'>
    <h1>📚 TOEIC 단어 학습</h1>

    <!-- 닉네임 등록 섹션 -->
    <div id='auth-section' class='selector-group'>
      <span class='selector-label'>사용자 설정</span>
      <div class='input-group'>
        <input type='text' id='nickname-input' placeholder='닉네임 입력'>
        <button onclick='saveNickname()' class='btn-main btn-save'>저장</button>
      </div>
      <p id='user-welcome' style='display: none;'></p>
    </div>

    <div class='selector-group'>
      <span class='selector-label'>학습 모드</span>
      <div class='btn-group'>
        <button id='mode-en-ko' class='active' onclick='setMode("en-ko")'>ENG ➡️ KOR</button>
        <button id='mode-ko-en' onclick='setMode("ko-en")'>KOR ➡️ ENG</button>
      </div>
    </div>

    <div class='selector-group'>
      <span class='selector-label'>문제 수 선택</span>
      <select id='limit-select' onchange='setLimit(parseInt(this.value))'>
        <option value='10'>10개</option>
        <option value='30'>30개</option>
        <option value='50'>50개</option>
        <option value='100'>100개</option>
      </select>
    </div>

    <div id='word-display'>
      <div id='word'>준비되셨나요?</div>
      <button id='speak-btn' onclick='speakWord()' style='visibility: hidden;'>🔊 발음 듣기</button>
    </div>

    <div id='choices' class='choices-grid'></div>

    <div id='result'></div>

    <!-- 예문 표시 영역 -->
    <div id='example-box'>
      <div id='example-header'>
        <div id='example-en'></div>
        <button class='ex-speak-btn' onclick='speakExample()'>🔊 예문 듣기</button>
      </div>
      <div id='example-ko'></div>
    </div>

    <div id='score-board'>
      <div id='score'>시작 버튼을 눌러주세요</div>
    </div>

    <button id='next-btn' onclick='nextQuestion()' style='display:none;'>다음 단어 ➡️</button>

    <div class='action-btns'>
      <button onclick='startQuiz()' class='btn-main btn-start'>학습 시작</button>
      <button id='review-btn' onclick='reviewMode()' class='btn-main btn-review'>틀린 단어 복습</button>
    </div>

    <!-- 스코어보드 섹션 -->
    <div id='scoreboard-container' style='display: none;'>
      <h2>🏆 명예의 전당 (Top 10)</h2>
      <div id='scoreboard-list'></div>
    </div>
  </div>

  <!-- 나만의 단어장 (플로팅) -->
  <div id='my-voca-container'>
    <button id='voca-toggle-btn' onclick='toggleVoca()'>📒 나만의 단어장</button>
    <div id='voca-content' style='display: none;'>
      <h3>📒 나만의 단어장</h3>
      <div class='voca-inputs'>
        <input type='text' id='voca-word' placeholder='단어 (English)'>
        <input type='text' id='voca-meaning' placeholder='뜻 (Korean)'>
        <button onclick='addCustomWord()' class='btn-add-voca'>추가</button>
      </div>
      <ul id='voca-list'></ul>
    </div>
  </div>

  <script src='main.js'></script>
</body>
</html>
