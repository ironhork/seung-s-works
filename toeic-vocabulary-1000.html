<!DOCTYPE html>
<html lang='ko'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>나의 단어장 - TOEIC VOCA Master</title>
  <meta name="description" content="나만의 토익 단어장을 만들어 나만의 속도로 학습하세요.">
  <link rel='stylesheet' href='style.css'>
</head>
<body>
  <!-- 상단 내비게이션 -->
  <header>
    <nav class="nav-container">
      <div class="logo" onclick="location.href='index.html'">📚 VOCA Master</div>
      <button onclick='location.href="index.html"' class='btn-main' style='background: var(--primary-gradient); padding: 10px 20px; font-size: 14px;'>🚀 학습하기</button>
      <ul class="nav-menu">
        <li><a href="toeic-vocabulary-1000.html">단어장</a></li>
        <li><a href="toeic-study-tips.html">학습칼럼</a></li>
        <li><a href="about.html">소개</a></li>
        <li><a href="privacy.html">개인정보</a></li>
      </ul>
      <button id='theme-btn' onclick='toggleTheme()'>🌙</button>
    </nav>
  </header>

  <main class='container'>
    <section class="text-left content-page">
      <h2 class="section-title">📖 나의 단어장</h2>
      <p style="margin-bottom: 25px;">나만의 토익 단어장을 만들어 나만의 속도로 학습하세요. 단어를 추가하고 퀴즈로 복습할 수 있습니다.</p>
      
      <!-- 단어 추가 섹션 -->
      <div class="article-card" style="margin-bottom: 30px;">
        <h3 style="margin-bottom: 15px; color: var(--primary-color);">➕ 새 단어 추가</h3>
        <div class='voca-inputs'>
          <input type='text' id='voca-word' placeholder='단어 (English)'>
          <input type='text' id='voca-meaning' placeholder='뜻 (Korean)'>
          <button onclick='addCustomWord()' class='btn-add-voca'>추가</button>
        </div>
      </div>

      <!-- 단어 목록 -->
      <div id="voca-word-list" style="margin-bottom: 30px;">
        <h3 style="margin-bottom: 15px; color: var(--primary-color);">📚 저장된 단어 (<span id="voca-count">0</span>개)</h3>
        <ul id='voca-list'></ul>
      </div>

      <div class="article-card" style="margin-top: 30px; text-align: center; background: var(--secondary-color);">
        <p>저장된 단어들로 퀴즈를 풀어보세요! (최소 4개 이상 필요)</p>
        <button onclick="startMyVocaQuiz()" class="btn-main btn-start" style="display: inline-block; width: auto; margin-top: 15px;">📝 퀴즈로 학습하기 ➡️</button>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-content">
      <p>&copy; 2026 TOEIC VOCA Master. All rights reserved.</p>
      <div class="footer-links">
        <a href="privacy.html">개인정보처리방침</a> | 
        <a href="about.html">이용약관</a> |
        <a href="contact.html">문의하기</a> |
        <a href="toeic-vocabulary-1000.html">단어장</a>
      </div>
    </div>
  </footer>

  <style>
    .voca-inputs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .voca-inputs input {
      flex: 1;
      min-width: 150px;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      background: var(--bg-color);
      color: var(--text-primary);
      font-size: 14px;
    }
    .voca-inputs input:focus {
      outline: none;
      border-color: var(--primary-color);
    }
  </style>

  <script src='main.js'></script>
  <script>
    function startMyVocaQuiz() {
      if (customVoca.length < 4) {
        alert('나만의 단어장에 최소 4개 이상의 단어가 필요합니다!');
        return;
      }
      location.href = 'index.html#quiz-section';
      localStorage.setItem('startVocaQuiz', 'true');
    }

    // Check if we should start vocabulary quiz on page load
    if (localStorage.getItem('startVocaQuiz') === 'true') {
      localStorage.removeItem('startVocaQuiz');
      setTimeout(() => {
        if (typeof vocaQuizMode === 'function') {
          vocaQuizMode();
        }
      }, 100);
    }
  </script>
</body>
</html>
